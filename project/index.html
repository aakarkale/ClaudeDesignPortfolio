<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>Aakar Kale — Senior Product Manager</title>
<meta name="description" content="Aakar Kale — Senior Product Manager. Ex-founder shipping AI-powered products with clarity and purpose." />

<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/app.css" />
<link rel="stylesheet" href="css/sections.css?v=10" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="400" fill="#0a0a0a"/>
    <text x="200" y="220" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700" font-size="120" fill="#ffdd55" letter-spacing="-6">AK.</text>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>

  <script src="js/data.js?v=4"></script>
  <script src="js/easter-eggs.js?v=6"></script>
  <script type="text/babel" src="js/chrome.jsx"></script>
  <script type="text/babel" src="js/sections.jsx"></script>
  <script type="text/babel">
    const { useState: uS, useEffect: uE, useRef: uR, useCallback: uC } = React;

    function App() {
      const [theme, toggleTheme] = useTheme();
      const [konami, setKonami] = uS(false);
      const [konamiToast, setKonamiToast] = uS(false);
      const [lpToast, setLpToast] = uS(false);
      const data = window.AK_DATA;

      useReveal();

      // Konami listener
      uE(() => {
        const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
        let i = 0;
        const onKey = (e) => {
          const k = e.key.length === 1 ? e.key.toLowerCase() : e.key;
          if (k === seq[i]) {
            i++;
            if (i === seq.length) {
              i = 0;
              setKonami(true);
              setKonamiToast(true);
              document.body.classList.add('konami-pulse');
              setTimeout(() => document.body.classList.remove('konami-pulse'), 900);
              setTimeout(() => setKonamiToast(false), 2800);
            }
          } else {
            i = (k === seq[0]) ? 1 : 0;
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      const handleLongPress = uC(() => {
        // Playful signature flash
        setLpToast(true);
        setTimeout(() => setLpToast(false), 2200);
        // Confetti-ish screen flash
        const flash = document.createElement('div');
        flash.style.cssText = `
          position:fixed; inset:0; pointer-events:none; z-index:9998;
          background: radial-gradient(circle at 28px 28px, var(--accent), transparent 40%);
          opacity:0; transition: opacity 400ms;
        `;
        document.body.appendChild(flash);
        requestAnimationFrame(() => flash.style.opacity = '0.5');
        setTimeout(() => { flash.style.opacity = '0'; setTimeout(()=> flash.remove(), 500); }, 600);
      }, []);

      const projectList = konami
        ? [data.secretProject, ...data.projects]
        : data.projects;

      return (
        <>
          <CustomCursor theme={theme} />
          <Topbar theme={theme} onToggleTheme={toggleTheme} onLogoLongPress={handleLongPress} />
          <main>
            <Hero theme={theme} data={data} />
            <About data={data} />
            <Work data={data} projects={projectList} unlocked={konami} />
            <Experience data={data} />
            <Skills data={data} />
            <Contact data={data} />
          </main>
          <Footer data={data} />

          <div className={`konami-toast ${konamiToast ? 'on' : ''}`}>
            ↑↑↓↓←→←→BA · Secret Project Unlocked
          </div>
          <div className={`lp-toast ${lpToast ? 'on' : ''}`}>
            Hi there 👋 · thanks for the squeeze
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    setTimeout(() => window.initEasterEggs && window.initEasterEggs(), 1200);
  </script>
</body>
</html>
